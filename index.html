<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#ff758c">

<title>Sahalam ❤️ Roshni</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500&display=swap" rel="stylesheet">

</head>

<body>

<!-- 🌸 Effects -->
<div class="flowers"></div>

<h1>Sahalam ❤️ Roshni 💖</h1>
<p class="subtitle">Every Letter Holds My Love 💌</p>

<!-- 🎵 MUSIC -->
<button class="music-btn" type="button" onclick="toggleMusic()">🎵 Play Music</button>

<div class="layout">

  <!-- TOP -->
  <div class="row">
    <div class="letter small" data-id="1">💌</div>
    <div class="letter small" data-id="2">💌</div>
    <div class="letter small" data-id="3">💌</div>
    <div class="letter small" data-id="4">💌</div>
  </div>

  <!-- MIDDLE -->
  <div class="row">
    <div class="side">
      <div class="letter small" data-id="5">💌</div>
      <div class="letter small" data-id="6">💌</div>
      <div class="letter small" data-id="7">💌</div>
    </div>

    <div class="letter big">💌</div>

    <div class="side">
      <div class="letter small" data-id="8">💌</div>
      <div class="letter small" data-id="9">💌</div>
      <div class="letter small" data-id="10">💌</div>
    </div>
  </div>

  <!-- BOTTOM -->
  <div class="row">
    <div class="letter small" data-id="11">💌</div>
    <div class="letter small" data-id="12">💌</div>
    <div class="letter small" data-id="13">💌</div>
    <div class="letter small" data-id="14">💌</div>
  </div>

</div>

<!-- 💍 PROPOSAL BUTTON -->
<button class="proposal-btn" type="button" onclick="showProposal()">💍 Open Final Letter</button>

<!-- 💌 QUOTE POPUP -->
<div class="popup" id="popup">
  <div class="paper">
    <div id="bgText" class="blur"></div>
    <div id="quoteText" class="text"></div>
    <button type="button" onclick="closePopup()">Close 💖</button>
  </div>
</div>

<!-- 💍 FINAL POPUP -->
<div class="popup" id="proposalPopup">
  <div class="paper">
    <div class="text">
      Roshni... 💖<br><br>
      From the day you came into my life,<br>
      everything changed...<br><br>
      I made mistakes... but you stayed...<br><br>
      Alhamdulillah... you are my peace.<br><br>
      InshaAllah... will you stay with me forever? 💍❤️
    </div>
    <button type="button" onclick="closeProposal()">Close 💖</button>
  </div>
</div>

<!-- 🎵 AUDIO -->
<audio id="music" loop preload="auto">
  <source src="music.mp3" type="audio/mp3">
</audio>

<!-- SCRIPT -->
<script src="script.js" defer></script>

</body>
</html>
